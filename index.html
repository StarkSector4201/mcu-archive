<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCU Streaming Hub | Watch & Download MCU Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="bg-overlay"></div>
        <div class="hero-background" id="heroBg"></div>

        <nav>
            <div class="logo">
                <span style="color: white; border: 2px solid var(--primary-color); padding: 0 5px;">MCU</span>
                <span>STREAM</span>
            </div>
            <div class="nav-links">
                <!-- Telegram Mini App specific features could go here -->
            </div>
        </nav>

        <section class="hero">
            <div class="hero-content">
                <p class="hero-subtitle">BEYOND THE MULTIVERSE</p>
                <h1>MCU STREAMING HUB</h1>
                <div class="hero-actions">
                    <button class="filter-btn active" data-filter="all">ALL MOVIES & SERIES</button>
                    <button class="filter-btn" data-filter="movie">MOVIES</button>
                    <button class="filter-btn" data-filter="series">TV SHOWS</button>
                </div>
            </div>
        </section>

        <section class="content-container">
            <div class="filters" id="phaseFilters">
                <button class="filter-btn active" data-phase="all">ALL PHASES</button>
                <button class="filter-btn" data-phase="1">PHASE 1</button>
                <button class="filter-btn" data-phase="2">PHASE 2</button>
                <button class="filter-btn" data-phase="3">PHASE 3</button>
                <button class="filter-btn" data-phase="4">PHASE 4</button>
                <button class="filter-btn" data-phase="5">PHASE 5</button>
            </div>

            <div class="movie-grid" id="movieGrid">
                <!-- Cards will be injected by JavaScript -->
            </div>
        </section>
    </div>

        <!-- Detail Modal -->
        <div id="movieModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div class="modal-body">
                    <div class="modal-header-grid">
                        <div class="modal-poster-container">
                            <img id="modalPoster" src="" alt="Poster">
                            <div id="videoPlayerContainer" class="video-player-container" style="display: none; position: relative;">
                                <video id="mainVideo" controls controlsList="nodownload nofullscreen" preload="metadata">
                                    Your browser does not support the video tag.
                                </video>
                                <div class="player-custom-controls">
                                    <button id="gearBtn" class="gear-btn" title="Settings">
                                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                                    </button>
                                    <button id="fsBtn" class="gear-btn" title="Fullscreen">
                                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                                    </button>
                                </div>
                                <div id="gearMenu" class="gear-menu" style="display: none;">
                                    <div class="gear-section">
                                        <div class="gear-label">QUALITY</div>
                                        <div id="qualityOptions" class="gear-options"></div>
                                    </div>
                                    <div class="gear-divider"></div>
                                    <div class="gear-section">
                                        <div class="gear-label">SUBTITLES</div>
                                        <div id="subtitleOptions" class="gear-options">
                                            <button class="sub-option active" data-sub="ar">العربية (Arabic)</button>
                                            <button class="sub-option" data-sub="en">English</button>
                                            <button class="sub-option" data-sub="off">Off</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-info">
                            <h2 id="modalTitle"></h2>
                            <p id="modalYearPhase" class="modal-meta"></p>
                            <div id="modalMetadata" class="modal-streaming-meta">
                                <span class="meta-tag quality-tag">1080p BluRay</span>
                                <span class="meta-tag lang-tag">English (Sub)</span>
                                <span class="meta-tag ar-tag">Arabic (Sub)</span>
                            </div>
                            <p id="modalSynopsis" class="modal-synopsis"></p>
                            <button id="modalPlayBtn" class="watch-btn">
                                <span class="btn-icon">▶</span> INITIALIZE PLAYBACK
                            </button>
                        </div>
                    </div>
                    
                    <div class="character-section">
                        <h3 class="section-title">MOVIE CAST</h3>
                        <div id="characterGrid" class="character-grid">
                            <!-- Character cards will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stark Admin Dashboard -->
        <div id="starkDashboard" class="modal stark-admin-dashboard">
            <div class="modal-content admin-content">
                <span class="close-admin">&times;</span>
                <div class="admin-header">
                    <h2>STARK DASHBOARD</h2>
                    <p>MISSION CONTROL OVERRIDE ACTIVE</p>
                </div>
                <div class="admin-body">
                    <div id="adminAuth" class="admin-auth">
                        <input type="password" id="ghToken" placeholder="ENTER ACCESS TOKEN">
                        <button id="authBtn">AUTHORIZE</button>
                    </div>
                    <div id="adminPanel" class="admin-panel" style="display: none;">
                        <div class="admin-controls">
                            <button id="commitBtn" class="primary-admin-btn">COMMIT CHANGES</button>
                        </div>
                        <div id="adminMovieGrid" class="admin-movie-list">
                            <!-- Movie edit cards will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script src="main.js"></script>
</body>
</html>
